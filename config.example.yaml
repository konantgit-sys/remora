# Remora Configuration
# Copy to config.yaml and fill in your keys
relays:
  - wss://relay.damus.io
  - wss://nos.lol
  - wss://relay.snin.v2.site

nostr:
  nsec: ""  # Your Nostr nsec private key
  npub: ""  # Your Nostr npub

llm:
